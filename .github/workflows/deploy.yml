name: Deploy React App to GitHub Pages

on:
  push:
    branches: ["main"] 

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # Removed the cache line that was causing the error

      - name: Install Dependencies
        run: npm install # Changed from npm ci to allow installation without a lock file

      - name: Build Project
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: './dist' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
